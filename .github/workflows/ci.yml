name: CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
    types: [opened, synchronize, reopened]

# Cancel redundant runs on the same PR/branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Job 1: ESLint
  # ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

  # ──────────────────────────────────────────────
  # Job 2: Prettier format check
  # ──────────────────────────────────────────────
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check formatting
        run: npm run format:check

  # ──────────────────────────────────────────────
  # Job 3: TypeScript type checking
  # ──────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run TypeScript compiler
        run: npx tsc --noEmit

  # ──────────────────────────────────────────────
  # Job 4: Unit tests
  # ──────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npm run test

  # ──────────────────────────────────────────────
  # Job 5: Build check (gates on all above)
  # Verifies the app compiles end-to-end. Dummy
  # env vars are used — no real secrets needed here.
  # ──────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [lint, format, typecheck, test]
    env:
      # Dummy values sufficient for Next.js compilation.
      # These are NOT production secrets — only used to satisfy module-level
      # env guards during the static page data collection phase of the build.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      NEXTAUTH_SECRET: ci-build-secret-not-used-in-production
      NEXTAUTH_URL: http://localhost:3000
      AUTH_SECRET: ci-build-secret-not-used-in-production
      # Stripe key must start with sk_test_ or sk_live_ to pass SDK validation
      STRIPE_SECRET_KEY: sk_test_ci_dummy_key_not_real_000000000000
      STRIPE_WEBHOOK_SECRET: whsec_ci_dummy_not_real
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_dummy_not_real
      # SMTP — email.ts uses || fallbacks so these just prevent undefined warnings
      SMTP_USER: ci@example.com
      SMTP_PASSWORD: ci_dummy_password
      SMTP_HOST: smtp.example.com
      SMTP_PORT: '465'
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build application
        run: npm run build

  # ──────────────────────────────────────────────
  # Job 6: Dependency audit (security gate)
  # REPORT-ONLY for now (continue-on-error): the tree currently has known
  # HIGH advisories whose remediation is deferred (finding F-055 — e.g. xlsx
  # has no npm-published fix, quill XSS is mitigated by DOMPurify). Surfacing
  # them in CI is useful; hard-blocking every PR on them is not. Flip
  # continue-on-error to false once F-055 remediation lands.
  # ──────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # Reads package-lock.json and queries the advisory DB — no install needed.
      # Exit code is non-zero when a HIGH or CRITICAL advisory is present.
      - name: Run npm audit (high+)
        run: npm audit --audit-level=high

  # ──────────────────────────────────────────────
  # Job 7: Secret scan (gitleaks)
  # Scans the working tree — INCLUDING .claude/agent-memory/** — for
  # committed secrets. Filesystem scan (--no-git), NOT git history, so
  # pre-existing historical leaks don't permanently block CI; history
  # scrubbing is tracked separately (see docs/deployment.md).
  # ──────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          VERSION="$(curl -sSfL https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep -oP '"tag_name":\s*"v\K[^"]+')"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # `detect --no-git` scans files on disk (working tree), so the scan
      # covers committed paths like .claude/agent-memory/** without failing
      # on secrets that only exist in older commits.
      - name: Scan working tree for secrets
        run: gitleaks detect --no-git --source . --config .gitleaks.toml --redact --verbose

  # ──────────────────────────────────────────────
  # Job 8: End-to-end tests (Playwright)
  # Spins up Postgres (pgvector — migrations CREATE EXTENSION "vector")
  # and Redis as services, applies migrations, seeds deterministic fixtures
  # (prisma/seed.ts), then runs the e2e suite. BLOCKING: the specs and seed
  # have been hardened for CI, so a failure here fails the PR. The suite bypasses
  # auth rate limiting via E2E_TEST_BYPASS_RATE_LIMIT (double-guarded to non-prod).
  # ──────────────────────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [lint, format, typecheck, test]
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lms_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # Real SMTP sink so email-dependent journeys (signup verification, invites)
      # actually deliver — signup fails closed when the verification email can't
      # be sent, so a dummy SMTP host makes the signup happy path untestable.
      mailhog:
        image: mailhog/mailhog:v1.0.1
        ports:
          - 1025:1025
          - 8025:8025

    env:
      # Playwright's webServer serves the production build (`npm run start -- -p 3005`
      # after the Build step below) — `next dev` route registration proved flaky in CI.
      # These mirror the Build job's dummy values; NEXT_PUBLIC_* are inlined at build
      # time, the rest are read at runtime. NOT secrets.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lms_test?schema=public
      REDIS_URL: redis://localhost:6379
      NEXTAUTH_SECRET: ci-build-secret-not-used-in-production
      AUTH_SECRET: ci-build-secret-not-used-in-production
      NEXTAUTH_URL: http://localhost:3005
      # NextAuth v5 reads AUTH_URL first (NEXTAUTH_URL is the legacy alias);
      # set both so post-login redirects always target the test server port.
      AUTH_URL: http://localhost:3005
      NEXT_PUBLIC_APP_URL: http://localhost:3005
      APP_URL: http://localhost:3005
      STRIPE_SECRET_KEY: sk_test_ci_dummy_key_not_real_000000000000
      STRIPE_WEBHOOK_SECRET: whsec_ci_dummy_not_real
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_dummy_not_real
      # Point at the MailHog service; the mail transport skips auth/STARTTLS for
      # loopback SMTP hosts (src/lib/email.ts), so plain port 1025 delivers even
      # under the production build.
      SMTP_USER: ci@example.com
      SMTP_PASSWORD: ci_dummy_password
      SMTP_HOST: localhost
      SMTP_PORT: '1025'
      # Dummy Microsoft Entra ID credentials so the NextAuth provider registers
      # (ENG-001 verifies the signIn POST fires). NOT real secrets.
      AUTH_MICROSOFT_ENTRA_ID_ID: ci-dummy-client-id
      AUTH_MICROSOFT_ENTRA_ID_SECRET: ci-dummy-client-secret
      AUTH_MICROSOFT_ENTRA_ID_TENANT_ID: ci-dummy-tenant-id
      # Bypass auth rate limiting during e2e (double-guarded to non-production).
      E2E_TEST_BYPASS_RATE_LIMIT: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Seed e2e database
        run: npx prisma db seed

      # Playwright's webServer runs `next start` in CI, so the app must be built
      # first. Runs after migrate/seed so any build-time page evaluation sees a
      # ready database. NEXT_PUBLIC_* values from the job env are inlined here.
      - name: Build app (production)
        run: npm run build

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e tests
        run: npx playwright test tests/e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
