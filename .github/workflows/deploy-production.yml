name: Deploy → Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          # GH_PAT_READ is passed as an env var into the remote shell session.
          # The deploy script uses it inline for git fetch and discards it.
          envs: GH_PAT_READ
          script: |
            export GH_PAT_READ="${{ secrets.GH_PAT_READ }}"
            bash /home/deploy/apps/lms-production/deploy-production.sh