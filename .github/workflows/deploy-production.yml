name: Deploy to Production

on:
  push:
    branches:
      - main
      - master

# Cancel any in-progress deployment for the same branch to avoid race conditions
concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-ref: ghcr.io/${{ github.repository }}:production-${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=production-latest
            type=sha,prefix=production-,format=long

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.PRODUCTION_NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.PRODUCTION_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_GEMINI_API_KEY=${{ secrets.PRODUCTION_NEXT_PUBLIC_GEMINI_API_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production VM
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR,GITHUB_REPO,IMAGE_REF
          script_stop: true
          script: |
            set -euo pipefail

            # Assuming production is deployed to a separate directory on the VM
            APP_DIR="/home/deploy/apps/lms-production"
            COMPOSE_FILE="${APP_DIR}/docker-compose.production.yml"
            ENV_FILE="${APP_DIR}/.env.production"

            # GITHUB variables need to be explicitly exported inside the script 
            # if passed via envs block to get interpolated inside strings if needed, 
            # though they are already in the environment.
            GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}"
            GITHUB_ACTOR="${{ github.actor }}"
            GITHUB_REPO="${{ github.repository }}"
            IMAGE_REF="${{ needs.build.outputs.image-ref }}"

            echo "==> [1/4] Updating compose config..."
            cd "${APP_DIR}"
            git remote set-url origin "https://x-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git"
            git fetch origin
            git reset --hard "origin/main"
            git remote set-url origin "https://github.com/${GITHUB_REPO}.git"

            echo "==> [2/4] Pulling production image: ${IMAGE_REF}..."
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            docker pull "${IMAGE_REF}"
            docker tag "${IMAGE_REF}" "ghcr.io/${GITHUB_REPO}:production-latest"

            if pm2 info lms-production > /dev/null 2>&1; then
              echo "==> Shutting down legacy PM2 instance 'lms-production' to free port 3000..."
              pm2 delete lms-production || true
              pm2 save || true
            fi

            echo "==> [3/4] Starting production services..."
            APP_IMAGE="${IMAGE_REF}" \
              docker compose -f "${COMPOSE_FILE}" --env-file "${ENV_FILE}" up -d

            echo "==> [4/4] Waiting for health check (port 3000)..."
            for i in $(seq 1 18); do
              if curl -sf http://localhost:3000/api/health > /dev/null; then
                echo "✅ Health check passed."
                break
              fi
              if [ "$i" -eq 18 ]; then
                echo "❌ Health check failed. Check logs:"
                docker compose -f "${COMPOSE_FILE}" logs --tail=50 app
                exit 1
              fi
              sleep 5
            done

            echo "✅ Production deployment complete."
