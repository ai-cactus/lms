name: Deploy to Staging

on:
  push:
    branches:
      - staging

# Cancel any in-progress deployment for the same branch to avoid race conditions
concurrency:
  group: deploy-staging
  cancel-in-progress: true

# Required for GITHUB_TOKEN to push to GHCR (GitHub Container Registry)
permissions:
  contents: read
  packages: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Build the Docker image in CI and push to GHCR
  # This runs on GitHub's own runners — no VM build overhead.
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-ref: ghcr.io/${{ github.repository }}:staging-${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GITHUB_TOKEN is automatically provided by Actions with packages:write permission
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx (enables layer caching)
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=staging-latest
            type=sha,prefix=staging-,format=long

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # NEXT_PUBLIC_* vars must be baked into the image at build time.
          # Store these as GitHub Actions secrets in the repo settings.
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.STAGING_NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.STAGING_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_GEMINI_API_KEY=${{ secrets.STAGING_NEXT_PUBLIC_GEMINI_API_KEY }}
          # GitHub Actions cache dramatically speeds up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy the pre-built image to the staging VM
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Staging VM
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPO: ${{ github.repository }}
          IMAGE_REF: ${{ needs.build.outputs.image-ref }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR,GITHUB_REPO,IMAGE_REF
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="/home/deploy/apps/lms-staging"
            COMPOSE_FILE="${APP_DIR}/docker-compose.staging.yml"
            ENV_FILE="${APP_DIR}/.env.staging"

            # ── [1/4] Update compose files on the VM ──────────────────────────
            echo "==> [1/4] Pulling latest compose config..."
            cd "${APP_DIR}"
            git remote set-url origin "https://x-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git"
            git fetch origin
            git reset --hard "origin/staging"
            git remote set-url origin "https://github.com/${GITHUB_REPO}.git"

            # ── [2/4] Pull the pre-built image from GHCR ─────────────────────
            echo "==> [2/4] Logging into GHCR and pulling image: ${IMAGE_REF}..."
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            docker pull "${IMAGE_REF}"
            # Also tag as staging-latest for ease of reference
            docker tag "${IMAGE_REF}" "ghcr.io/${GITHUB_REPO}:staging-latest"

            # ── [3/4] Start / update services ────────────────────────────────
            # db and redis only restart if their config changed (idempotent).
            # The app container is recreated with the new image.
            
            if pm2 info lms-staging > /dev/null 2>&1; then
              echo "==> Shutting down legacy PM2 instance 'lms-staging' to free port 3001..."
              pm2 delete lms-staging || true
              pm2 save || true
            fi

            echo "==> [3/4] Starting services..."
            APP_IMAGE="${IMAGE_REF}" \
              docker compose -f "${COMPOSE_FILE}" --env-file "${ENV_FILE}" up -d

            # ── [4/4] Verify the app is healthy ──────────────────────────────
            echo "==> [4/4] Waiting for health check (up to 90s)..."
            for i in $(seq 1 18); do
              if curl -sf http://localhost:3001/api/health > /dev/null; then
                echo "✅ Health check passed."
                break
              fi
              if [ "$i" -eq 18 ]; then
                echo "❌ Health check failed after 90s. Check logs:"
                docker compose -f "${COMPOSE_FILE}" logs --tail=50 app
                exit 1
              fi
              sleep 5
            done

            echo ""
            echo "✅ Staging deployment complete. Image: ${IMAGE_REF}"
