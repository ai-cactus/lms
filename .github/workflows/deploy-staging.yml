name: Deploy to Staging

on:
  push:
    branches:
      - staging

# Cancel any in-progress deployment for the same branch to avoid race conditions
concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GH_PAT: ${{ secrets.GH_PAT_READ }}
          GITHUB_REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GH_PAT,GITHUB_REPO
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="/home/deploy/apps/lms-staging"
            BRANCH="staging"

            echo "==> [1/7] Updating source code..."
            cd "$APP_DIR"

            # Inject PAT into remote URL for authenticated pull.
            # Reset URL immediately after so the token is never persisted on disk.
            git remote set-url origin "https://x-token:${GH_PAT}@github.com/${GITHUB_REPO}.git"
            git fetch origin
            git reset --hard "origin/${BRANCH}"
            git remote set-url origin "https://github.com/${GITHUB_REPO}.git"

            echo "==> [2/7] Installing dependencies..."
            # --legacy-peer-deps is required due to transitive peer conflicts
            # between nodemailer@8 and next-auth@5 beta (harmless at runtime).
            npm ci --legacy-peer-deps

            echo "==> [3/7] Generating Prisma client..."
            npx prisma generate

            echo "==> [4/6] Checking migration baseline..."
            # DATABASE_URL lives in .env — the shell doesn't auto-source it.
            # Extract it explicitly before using it in psql.
            DATABASE_URL=$(grep -E '^DATABASE_URL=' .env | head -1 | cut -d'=' -f2-)
            # Strip surrounding quotes if present (e.g. DATABASE_URL="postgres://...")
            DATABASE_URL=$(echo "$DATABASE_URL" | sed 's/^"|"$//g' | sed "s/^\'|\'$//g")

            # For databases that previously used `prisma db push`, the tables
            # exist but there is no migration history. We detect this by checking
            # if the User table exists AND _prisma_migrations does not. If so,
            # we mark 0_init as applied so migrate deploy doesn't try to re-run it.
            # For brand-new empty databases, we skip this entirely so migrate deploy
            # actually runs the 0_init SQL and creates all tables.
            USER_TABLE_EXISTS=$(psql "$DATABASE_URL" -tAc \
              "SELECT EXISTS (SELECT 1 FROM information_schema.tables WHERE table_schema='public' AND table_name='User')" \
              2>/dev/null || echo "false")

            MIGRATIONS_TABLE_EXISTS=$(psql "$DATABASE_URL" -tAc \
              "SELECT EXISTS (SELECT 1 FROM information_schema.tables WHERE table_schema='public' AND table_name='_prisma_migrations')" \
              2>/dev/null || echo "false")

            if [ "$USER_TABLE_EXISTS" = "t" ] && [ "$MIGRATIONS_TABLE_EXISTS" = "f" ]; then
              echo "  → Existing db-push database detected — baselining 0_init migration..."
              npx prisma migrate resolve --applied 0_init
            else
              echo "  → Fresh database or already baselined — skipping resolve step."
            fi

            echo "==> [5/6] Running database migrations..."
            # Only applies migrations not yet recorded — safe and idempotent.
            npx prisma migrate deploy

            echo "==> [6/6] Building application..."
            npm run build

            echo "==> [7/7] Reloading PM2 (zero-downtime rolling reload)..."
            pm2 reload lms-staging --update-env

            echo ""
            echo "✅ Staging deployment complete."