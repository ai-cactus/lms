# docker-compose.production.yml
#
# Manages the full LMS production stack:
#   - app   → Next.js (port 3000, served via Nginx on the host)
#   - db    → PostgreSQL 16 (internal network only — no host port)
#   - redis → Redis 7 (internal network only — no host port)
#
# Usage on the VM (after SCPing .env.production):
#   docker compose -f docker-compose.production.yml --env-file .env.production build
#   docker compose -f docker-compose.production.yml --env-file .env.production up -d

name: lms-production

services:
  # ── Next.js Application ──────────────────────────────────────────────────────
  app:
    container_name: lms-production-app
    # Image is built in GitHub Actions CI, pushed to GHCR, then pulled here.
    image: ${APP_IMAGE:?APP_IMAGE must be set. Run via the deploy workflow or set manually.}
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: '3000'
      DATABASE_URL: postgresql://${POSTGRES_USER:-lms}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-lms_production}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # MinIO is on the internal Docker network — override the endpoint
      MINIO_ENDPOINT: minio
      MINIO_PORT: '9000'
      MINIO_USE_SSL: 'false'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - production-net
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/api/health 2>/dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Two replicas would require a load balancer / docker swarm — keeping at 1
    # for this single-VM setup. Scale horizontally by moving to Cloud Run later.
    deploy:
      resources:
        limits:
          memory: 1g

  # ── PostgreSQL Database ───────────────────────────────────────────────────────
  db:
    container_name: lms-production-db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lms_production}
      POSTGRES_USER: ${POSTGRES_USER:-lms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.production}
    volumes:
      - /home/deploy/data/postgres-production:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-lms} -d ${POSTGRES_DB:-lms_production}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - production-net

  # ── Redis (for BullMQ job queues) ────────────────────────────────────────────
  redis:
    container_name: lms-production-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env.production} --appendonly yes
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - /home/deploy/data/redis-production:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a $$REDIS_PASSWORD ping | grep -q PONG']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - production-net

  # ── MinIO (GCS fallback / local object storage) ───────────────────────────────
  minio:
    container_name: lms-production-minio
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY must be set in .env.production}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY must be set in .env.production}
    volumes:
      - /home/deploy/data/minio-production:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - production-net

networks:
  production-net:
    driver: bridge
    name: lms-production-net
