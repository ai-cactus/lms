# /etc/nginx/sites-available/lms
#
# Reverse proxy for LMS apps running under PM2.
# Cloudflare Tunnel handles external HTTPS/TLS termination, so no SSL
# config is needed here. This file handles local routing only.
#
# After editing, reload with: sudo nginx -t && sudo systemctl reload nginx

# Production — lms.theraptly.com / training.theraptly.com → localhost:3000
# NOTE: training.theraptly.com is the real prod host routed by Cloudflare Tunnel
# (see cloudflared_config.yml). lms.theraptly.com is kept because DNS usage could
# not be verified — do not remove it without confirming nothing still resolves it.
server {
    listen 80;
    server_name lms.theraptly.com training.theraptly.com;

    # Video-course uploads (system back office) can be large. Keep this >=
    # MAX_VIDEO_UPLOAD_BYTES in the app (default 500MB). NOTE: Cloudflare's
    # plan still caps proxied request bodies (100MB on Free/Pro) — see docs.
    client_max_body_size 512M;
    client_body_timeout 300s;

    # Trust Cloudflare's forwarded IP headers so logs show real client IPs
    # and the app can enforce HTTPS-only checks correctly.
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    # ── Security headers (mirror next.config.ts) ──────────────────────────────
    # The app also emits these; nginx re-asserts them so they apply to every
    # response (incl. static/error paths) once cloudflared routes via nginx.
    # Values MUST stay byte-identical to next.config.ts: identical duplicate
    # headers do not change behavior (duplicate CSPs intersect to the same
    # policy). If you tighten one here, tighten it in next.config.ts too.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'" always;

    location / {
        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;

        # WebSocket support
        proxy_set_header    Upgrade            $http_upgrade;
        proxy_set_header    Connection         "upgrade";

        # Pass real client context to the app
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;

        proxy_cache_bypass  $http_upgrade;

        # Timeouts generous enough for AI pipeline requests
        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
    }
}

# Staging — staging-lms.theraptly.com → localhost:3001
server {
    listen 80;
    server_name staging-lms.theraptly.com;

    # Video-course uploads (system back office) can be large. Keep this >=
    # MAX_VIDEO_UPLOAD_BYTES in the app (default 500MB). NOTE: Cloudflare's
    # plan still caps proxied request bodies (100MB on Free/Pro) — see docs.
    client_max_body_size 512M;
    client_body_timeout 300s;

    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    # ── Security headers (mirror next.config.ts) ──────────────────────────────
    # The app also emits these; nginx re-asserts them so they apply to every
    # response (incl. static/error paths) once cloudflared routes via nginx.
    # Values MUST stay byte-identical to next.config.ts: identical duplicate
